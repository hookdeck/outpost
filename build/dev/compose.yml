name: "outpost"

# Wait for whichever deps are active in the current profile set; required:false
# means a dep that isn't in any active profile is skipped rather than erroring.
x-deps-depends-on: &deps_depends_on
  redis:      { condition: service_healthy, required: false }
  dragonfly:  { condition: service_healthy, required: false }
  postgres:   { condition: service_healthy, required: false }
  clickhouse: { condition: service_healthy, required: false }
  rabbitmq:   { condition: service_healthy, required: false }
  localstack: { condition: service_healthy, required: false }
  gcp:        { condition: service_healthy, required: false }

services:
  api:
    image: outpost
    build:
      context: ../../
      dockerfile: ./build/dev/Dockerfile
    volumes:
      - ../../:/app
      - go_mod_cache:/go/pkg
      - go_build_cache:/root/.cache/go-build
    ports:
      - "3333:3333"
    env_file: ../../.env
    environment:
      SERVICE: api
    depends_on: *deps_depends_on
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3333/api/v1/healthz"]
      interval: 2s
      timeout: 2s
      retries: 60

  delivery:
    image: outpost
    volumes:
      - ../..:/app
      - go_mod_cache:/go/pkg
      - go_build_cache:/root/.cache/go-build
    env_file: ../../.env
    environment:
      SERVICE: delivery
    depends_on:
      <<: *deps_depends_on
      api: { condition: service_healthy }

  log:
    image: outpost
    volumes:
      - ../..:/app
      - go_mod_cache:/go/pkg
      - go_build_cache:/root/.cache/go-build
    env_file: ../../.env
    environment:
      SERVICE: log
    depends_on:
      <<: *deps_depends_on
      api: { condition: service_healthy }

  portal:
    build:
      context: ../../
      dockerfile: ./build/dev/portal/Dockerfile
    volumes:
      - ../../internal/portal:/app
      - portal_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    env_file: ../../.env
    command: sh -c "npm install && npx vite dev --host"

volumes:
  portal_node_modules:
    driver: local
  go_mod_cache:
    driver: local
  go_build_cache:
    driver: local
