name: outpost-publish-nats
services:
  publish_nats:
    container_name: publish_nats
    image: nats:2.10-alpine
    command:
      - "-js"
      - "-m"
      - "8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ./data/publish-nats:/data
