# Default values for Outpost.

outpost:
  imagePullSecrets: []
  image:
    repository: hookdeck/outpost
    tag: latest
    pullPolicy: IfNotPresent

  # Number of replicas for each service
  replicas:
    api: 1 # Default to 1, scale based on load
    delivery: 1 # Default to 1, scale based on queue size
    log: 1 # Default to 1, scale based on log volume

  # ServiceAccount to use for pods
  serviceAccountName: ""

  # Container resources (optional)
  resources: {}

  # Extra labels added to pod templates
  podLabels: {}

  # Annotations added to pod templates
  podAnnotations: {}

  # Pod scheduling constraints
  nodeSelector: {}
  affinity: {}
  tolerations: []

  # Environment variables from Secrets/ConfigMaps
  envFrom: []
  # - secretRef:
  #     name: my-secret
  # - configMapRef:
  #     name: my-configmap

  service:
    type: ClusterIP
    port: 3333
    annotations: {}
    loadBalancerSourceRanges: []

  # Outpost YAML config
  config: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    []
    # - host: outpost.local
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls:
    []
    # - secretName: outpost-tls
    #   hosts:
    #     - outpost.example.com
