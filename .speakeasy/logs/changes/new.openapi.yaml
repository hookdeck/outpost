  /metrics/events:
    get:
      tags: [Metrics]
      summary: Get Event Metrics
      description: |
        Returns aggregated event publish metrics. Supports time bucketing via granularity,
        dimensional grouping, and filtering.

        **Measures:** `count`, `rate`

        **Dimensions:** `tenant_id` (admin-only), `topic`, `destination_id`

        **Filters:** `tenant_id` (admin-only), `topic`, `destination_id`
      operationId: getEventMetrics
      parameters:
        - name: time
          in: query
          required: true
          style: deepObject
          explode: true
          schema:
            type: object
            required:
              - start
              - end
            properties:
              start:
                type: string
                format: date-time
                description: Start of the time range (inclusive). ISO 8601 timestamp.
                example: "2026-03-02T00:00:00Z"
              end:
                type: string
                format: date-time
                description: End of the time range (exclusive). ISO 8601 timestamp.
                example: "2026-03-03T00:00:00Z"
          description: Time range for the metrics query.
        - name: granularity
          in: query
          required: false
          schema:
            type: string
          description: |
            Time bucketing granularity. Pattern: `<number><unit>`.
            Units: `s` (1-60), `m` (1-60), `h` (1-24), `d` (1-31), `w` (1-4), `M` (1-12).
            When omitted, returns a single aggregate row per dimension combination.
          example: "1h"
        - name: measures
          in: query
          required: true
          schema:
            oneOf:
              - type: string
                enum: [count, rate]
              - type: array
                items:
                  type: string
                  enum: [count, rate]
          description: Measures to compute. At least one required. `rate` is events/second throughput. Use bracket notation for multiple values (e.g., `measures[0]=count`).
          example: ["count"]
        - name: dimensions
          in: query
          required: false
          schema:
            oneOf:
              - type: string
                enum: [tenant_id, topic, destination_id]
              - type: array
                items:
                  type: string
                  enum: [tenant_id, topic, destination_id]
          description: Dimensions to group results by. Use bracket notation for multiple values (e.g., `dimensions[0]=topic&dimensions[1]=destination_id`).
        - name: filters[topic]
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: Filter by topic name(s). Use bracket notation for multiple values (e.g., `filters[topic][0]=user.created&filters[topic][1]=user.updated`).
        - name: filters[destination_id]
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: Filter by destination ID(s). Use bracket notation for multiple values (e.g., `filters[destination_id][0]=d1&filters[destination_id][1]=d2`).
        - name: filters[tenant_id]
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: Filter by tenant ID(s). Admin-only — rejected with 403 for JWT callers. Use bracket notation for multiple values (e.g., `filters[tenant_id][0]=t1&filters[tenant_id][1]=t2`).
      responses:
        "200":
          description: Aggregated event metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
              examples:
                HourlyEventCount:
                  value:
                    data:
                      - time_bucket: "2026-03-02T14:00:00Z"
                        dimensions:
                          topic: "user.created"
                        metrics:
                          count: 1423
                      - time_bucket: "2026-03-02T15:00:00Z"
                        dimensions:
                          topic: "user.created"
                        metrics:
                          count: 1891
                    metadata:
                      granularity: "1h"
                      query_time_ms: 42
                      row_count: 2
                      row_limit: 100000
                      truncated: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: JWT caller attempted to use admin-only dimension or filter (tenant_id).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /metrics/attempts:
