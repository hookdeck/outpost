openapi: 3.1.0
info:
  title: Outpost API
  version: "0.0.1"
  description: |
    The Outpost API is a REST-based JSON API for managing tenants, destinations, and publishing events.
  contact:
    name: Outpost Support
    email: support@hookdeck.com
    url: https://hookdeck.com/docs/outpost
servers:
  - url: https://api.outpost.hookdeck.com/2025-07-01
    description: Outpost API (production)
  - url: http://localhost:3333/api/v1
    description: Local development server base path
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      x-speakeasy-name-override: apiKey
      description: |
        Bearer token for authentication. The SDK exposes a single "apiKey" parameter; its value can be either:

        **Admin API Key:** Static key configured via the `API_KEY` environment variable.
        Required for admin operations (publishing events, managing tenants, generating tenant tokens).

        **JWT (tenant token):** Obtained via GET /tenants/{tenant_id}/token (requires Admin API Key). Valid for 24 hours, scoped to one tenant.
        Use for tenant-scoped operations (e.g. listing destinations for that tenant).
  responses:
    BadRequest:
      description: A collection of codes that generally means the end user got something wrong in making the request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequest"
    Unauthorized:
      description: A collection of codes that generally means the client was not authenticated correctly for the request they want to make
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Unauthorized"
    NotFound:
      description: Status codes relating to the resource/entity they are requesting not being found or endpoints/routes not existing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NotFound"
    ValidationError:
      description: Request body fails validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    InternalServerError:
      description: A collection of status codes that generally mean the server failed in an unexpected way
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InternalServerError"
    RateLimited:
      description: Status codes relating to the client being rate limited by the server
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimited'
    Timeout:
      description: Timeouts occurred with the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Timeout'
  schemas:
    # Shared Query Schemas
    Operator:
      type: object
      description: Comparison operators for filtering by date-time values (RFC3339 or YYYY-MM-DD format).
      properties:
        gte:
          type: string
          format: date-time
          description: Filter with value >= the specified date-time.
        lte:
          type: string
          format: date-time
          description: Filter with value <= the specified date-time.
        gt:
          type: string
          format: date-time
          description: Filter with value > the specified date-time.
        lt:
          type: string
          format: date-time
          description: Filter with value < the specified date-time.
    # Base Schemas
    Tenant:
      type: object
      properties:
        id:
          type: string
          description: User-defined system ID for the tenant.
          example: "123"
        destinations_count:
          type: integer
          description: Number of destinations associated with the tenant.
          example: 5
        topics:
          type: array
          items:
            type: string
          description: List of subscribed topics across all destinations for this tenant.
          example: ["user.created", "user.deleted"]
        metadata:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Arbitrary key-value pairs for storing contextual information about the tenant.
          example: {"name": "Acme Inc."}
        created_at:
          type: string
          format: date-time
          description: ISO Date when the tenant was created.
          example: "2024-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: ISO Date when the tenant was last updated.
          example: "2024-01-01T00:00:00Z"
    TenantUpsert:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Optional key/value metadata to store with the tenant.
    TenantPaginatedResult:
      type: object
      description: Paginated list of tenants.
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
          description: Array of tenant objects.
        pagination:
          $ref: "#/components/schemas/SeekPagination"
        count:
          type: integer
          description: Total count of all tenants.
          example: 42
    PortalRedirect:
      type: object
      properties:
        redirect_url:
          type: string
          format: url
          description: Redirect URL containing a JWT to authenticate the user with the portal.
          example: "https://webhooks.acme.com/?token=JWT_TOKEN&tenant_id=tenant_123"
        tenant_id:
          type: string
          description: The ID of the tenant associated with this portal session.
          example: "tenant_123"
    TenantToken:
      type: object
      properties:
        token:
          type: string
          description: JWT token scoped to the tenant for safe browser API calls.
          example: "SOME_JWT_TOKEN"
        tenant_id:
          type: string
          description: The ID of the tenant this token is scoped to.
          example: "tenant_123"
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
    Topics:
      oneOf:
        - type: string
          enum: ["*"]
        - type: array
          items:
            type: string
      description: '"*" or an array of enabled topics.'
      example: "*"
    Filter:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Optional JSON schema filter for event matching. Events must match this filter to be delivered to this destination.
        Supports operators: $eq, $neq, $gt, $gte, $lt, $lte, $in, $nin, $startsWith, $endsWith, $exist, $or, $and, $not.
        If null or empty, all events matching the topic filter will be delivered.
        Uses full-replacement semantics on update: send a new object to replace, null or `{}` to clear, omit for no change.
      example:
        data:
          amount:
            $gte: 100
          customer:
            tier: "premium"
    SeekPagination:
      type: object
      description: Cursor-based pagination metadata for list responses.
      properties:
        order_by:
          type: string
          description: The field being sorted on.
          example: "created_at"
        dir:
          type: string
          enum: [asc, desc]
          description: Sort direction.
          example: "desc"
        limit:
          type: integer
          description: Page size limit.
          example: 100
        next:
          type: string
          nullable: true
          description: Cursor for the next page of results. Null if no more results.
          example: "MTcwNDA2NzIwMA=="
        prev:
          type: string
          nullable: true
          description: Cursor for the previous page of results. Null if on first page.
          example: null
    APIErrorResponse:
      type: object
      description: Standard error response format.
      properties:
        status:
          type: integer
          description: HTTP status code.
          example: 422
        message:
          type: string
          description: Human-readable error message.
          example: "validation error"
        data:
          description: Additional error details. For validation errors, this is an array of human-readable messages.
          oneOf:
            - type: array
              items:
                type: string
              description: Array of validation error messages.
              example: ["email is required", "password must be at least 6 characters"]
            - type: object
              additionalProperties: true
              description: Additional contextual data about the error.
    # Destination Type Specific Config/Credentials Schemas
    WebhookConfig:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: url
          description: The URL to send the webhook events to.
          example: "https://example.com/webhooks/user"
        custom_headers:
          type: string
          description: JSON string of custom HTTP headers to include with every webhook request. Header names must be valid HTTP header tokens (alphanumeric, hyphens, underscores). Reserved headers (Content-Type, Host, etc.) cannot be overridden.
          example: '{"x-api-key":"secret123","x-tenant-id":"customer-456"}'
    WebhookCredentials:
      type: object
      properties:
        secret:
          type: string
          description: The secret used for signing webhook requests. Auto-generated if omitted on creation by admin. Read-only for tenants unless rotating.
          example: "whsec_abc123"
        previous_secret:
          type: string
          description: The previous secret used during rotation. Valid for 24 hours by default. Read-only.
          example: "whsec_xyz789"
        previous_secret_invalid_at:
          type: string
          format: date-time
          description: ISO timestamp when the previous secret becomes invalid. Read-only.
          example: "2024-01-02T00:00:00Z"
    AWSSQSConfig:
      type: object
      required: [queue_url]
      properties:
        endpoint:
          type: string
          format: url
          description: Optional. Custom AWS endpoint URL (e.g., for LocalStack or specific regions).
          example: "https://sqs.us-east-1.amazonaws.com" # Corrected Example
        queue_url:
          type: string
          format: url # Technically an ARN/URL hybrid, but URL format is close enough
          description: The URL of the SQS queue.
          example: "https://sqs.us-east-1.amazonaws.com/123456789012/my-queue"
    AWSSQSCredentials:
      type: object
      required: [key, secret]
      properties:
        key:
          type: string
          description: AWS Access Key ID.
          example: "AKIAIOSFODNN7EXAMPLE"
        secret:
          type: string
          description: AWS Secret Access Key.
          example: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
        session:
          type: string
          description: Optional AWS Session Token (for temporary credentials).
          example: "AQoDYXdzEPT//////////wEXAMPLE..."
    RabbitMQConfig:
      type: object
      required: [server_url, exchange]
      properties:
        server_url:
          type: string
          description: RabbitMQ server address (host:port).
          example: "localhost:5672"
        exchange:
          type: string
          description: The exchange to publish messages to.
          example: "my-exchange"
        tls:
          type: string
          enum: ["true", "false"]
          description: Whether to use TLS connection (amqps). Defaults to "false".
          example: "false"
    RabbitMQCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: RabbitMQ username.
          example: "guest"
        password:
          type: string
          description: RabbitMQ password.
          example: "guest"
    HookdeckCredentials: # Hookdeck has no config fields, only credentials
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Hookdeck authentication token.
          example: "hd_token_..."
    AWSKinesisConfig:
      type: object
      required: [stream_name, region]
      properties:
        stream_name:
          type: string
          description: The name of the AWS Kinesis stream.
          example: "my-data-stream"
        region:
          type: string
          description: The AWS region where the Kinesis stream is located.
          example: "us-east-1"
        endpoint:
          type: string
          format: url
          description: Optional. Custom AWS endpoint URL (e.g., for LocalStack or VPC endpoints).
          example: "https://kinesis.us-east-1.amazonaws.com"
        partition_key_template:
          type: string
          description: Optional. JMESPath template to extract the partition key from the event payload (e.g., `metadata."event-id"`). Defaults to event ID.
          example: 'data."user_id"'
    AWSKinesisCredentials:
      type: object
      required: [key, secret]
      properties:
        key:
          type: string
          description: AWS Access Key ID.
          example: "AKIAIOSFODNN7EXAMPLE"
        secret:
          type: string
          description: AWS Secret Access Key.
          example: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
        session:
          type: string
          description: Optional AWS Session Token (for temporary credentials).
          example: "AQoDYXdzEPT//////////wEXAMPLE..."
    AzureServiceBusConfig:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: The name of the Azure Service Bus queue or topic to publish messages to.
          example: "my-queue-or-topic"
    AzureServiceBusCredentials:
      type: object
      required: [connection_string]
      properties:
        connection_string:
          type: string
          description: The connection string for the Azure Service Bus namespace.
          example: "Endpoint=sb://namespace.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=abc123"
    AWSS3Config:
      type: object
      required: [bucket, region]
      properties:
        bucket:
          type: string
          description: The name of your AWS S3 bucket.
          example: "my-bucket"
        region:
          type: string
          description: The AWS region where your bucket is located.
          pattern: "^[a-z]{2}-[a-z]+-[0-9]+$"
          example: "us-east-1"
        key_template:
          type: string
          description: JMESPath expression for generating S3 object keys. Default is join('', [time.rfc3339_nano, '_', metadata."event-id", '.json']).
          example: 'join(''/'', [time.year, time.month, time.day, metadata."event-id", ''.json''])'
        storage_class:
          type: string
          description: The storage class for the S3 objects (e.g., STANDARD, INTELLIGENT_TIERING, GLACIER, etc.). Defaults to "STANDARD".
          example: "STANDARD"
    AWSS3Credentials:
      type: object
      required: [key, secret]
      properties:
        key:
          type: string
          description: AWS Access Key ID.
          example: "AKIAIOSFODNN7EXAMPLE"
        secret:
          type: string
          description: AWS Secret Access Key.
          example: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
        session:
          type: string
          description: Optional AWS Session Token (for temporary credentials).
          example: "AQoDYXdzEPT//////////wEXAMPLE..."
    GCPPubSubConfig:
      type: object
      required: [project_id, topic]
      properties:
        project_id:
          type: string
          description: The GCP project ID.
          example: "my-project-123"
        topic:
          type: string
          description: The Pub/Sub topic name.
          example: "events-topic"
        endpoint:
          type: string
          description: Optional. Custom endpoint URL (e.g., localhost:8085 for emulator).
          example: "pubsub.googleapis.com:443"
    GCPPubSubCredentials:
      type: object
      required: [service_account_json]
      properties:
        service_account_json:
          type: string
          description: Service account key JSON. The entire JSON key file content as a string.
          example: '{"type":"service_account","project_id":"my-project","private_key_id":"key123","private_key":"-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n","client_email":"my-service@my-project.iam.gserviceaccount.com"}'
    KafkaConfig:
      type: object
      required: [brokers, topic, sasl_mechanism]
      properties:
        brokers:
          type: string
          description: Comma-separated list of Kafka broker addresses.
          example: "broker1.example.com:9092,broker2.example.com:9092"
        topic:
          type: string
          description: The Kafka topic to publish messages to.
          example: "events"
        sasl_mechanism:
          type: string
          enum: [plain, scram-sha-256, scram-sha-512]
          description: SASL authentication mechanism.
          example: "scram-sha-256"
        tls:
          type: string
          enum: ["true", "false"]
          description: Whether to enable TLS for the connection.
          default: "true"
          example: "true"
        partition_key_template:
          type: string
          description: Optional JMESPath template to extract the partition key from the event payload. Defaults to the event ID.
          example: "data.customer_id"
    KafkaCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: SASL username for authentication.
          example: "outpost"
        password:
          type: string
          description: SASL password for authentication.
          example: "secure_password_123"
    # Type-Specific Destination Schemas (for Responses)
    DestinationWebhook:
      type: object
      x-docs-type: "Webhook"
      # Properties duplicated from DestinationBase
      required: [id, type, topics, config, credentials, created_at, updated_at, disabled_at]
      properties:
        id:
          type: string
          description: Control plane generated ID or user provided ID for the destination.
          example: "des_12345"
        type:
          type: string
          description: Type of the destination.
          enum: [webhook]
          example: "webhook"
        topics:
          $ref: "#/components/schemas/Topics"
        filter:
          $ref: "#/components/schemas/Filter"
        disabled_at:
          type: string
          format: date-time
          nullable: true
          description: ISO Date when the destination was disabled, or null if enabled.
          example: null
        created_at:
          type: string
          format: date-time
          description: ISO Date when the destination was created.
          example: "2024-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: ISO Date when the destination was last updated.
          example: "2024-01-01T00:00:00Z"
        config:
          $ref: "#/components/schemas/WebhookConfig"
        credentials:
          $ref: "#/components/schemas/WebhookCredentials"
        delivery_metadata:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Static key-value pairs merged into event metadata on every attempt.
          example: {"app-id": "my-app", "region": "us-east-1"}
        metadata:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Arbitrary contextual information stored with the destination.
          example: {"internal-id": "123", "team": "platform"}
        target:
          type: string
          description: A human-readable representation of the destination target (e.g., URL host). Read-only.
          readOnly: true
          example: "my-service.com"
        target_url:
          type: string
          format: url
          nullable: true # Should always have a URL for webhook
          description: A URL link to the destination target (the webhook URL). Read-only.
          readOnly: true
          example: "https://my-service.com/webhook/handler"
      example:
        id: "des_webhook_123"
        type: "webhook"
        topics: ["user.created", "order.shipped"]
        disabled_at: null
        created_at: "2024-02-15T10:00:00Z"
        updated_at: "2024-02-15T10:00:00Z"
        config:
          url: "https://my-service.com/webhook/handler"
        credentials:
          secret: "whsec_abc123def456"
          previous_secret: "whsec_prev789xyz012"
          previous_secret_invalid_at: "2024-02-16T10:00:00Z"
    DestinationAWSSQS:
      type: object
      x-docs-type: "AWS SQS"
      # Properties duplicated from DestinationBase
      required: [id, type, topics, config, credentials, created_at, updated_at, disabled_at]
      properties:
        id:
          type: string
          description: Control plane generated ID or user provided ID for the destination.
          example: "des_12345"
        type:
          type: string
          description: Type of the destination.
          enum: [aws_sqs]
          example: "aws_sqs"
        topics:
          $ref: "#/components/schemas/Topics"
        filter:
          $ref: "#/components/schemas/Filter"
        disabled_at:
          type: string
          format: date-time
          nullable: true
          description: ISO Date when the destination was disabled, or null if enabled.
          example: null
        created_at:
          type: string
          format: date-time
          description: ISO Date when the destination was created.
          example: "2024-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: ISO Date when the destination was last updated.
          example: "2024-01-01T00:00:00Z"
        config:
          $ref: "#/components/schemas/AWSSQSConfig"
        credentials:
          $ref: "#/components/schemas/AWSSQSCredentials"
        delivery_metadata:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Static key-value pairs merged into event metadata on every attempt.
          example: {"app-id": "my-app", "region": "us-east-1"}
        metadata:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Arbitrary contextual information stored with the destination.
          example: {"internal-id": "123", "team": "platform"}
        target:
          type: string
          description: A human-readable representation of the destination target (SQS queue name). Read-only.
          readOnly: true
          example: "my-app-queue"
        target_url:
          type: string
          format: url
          nullable: true # Can construct AWS console URL
          description: A URL link to the destination target (AWS Console link to the queue). Read-only.
          readOnly: true
          example: "https://us-west-2.console.aws.amazon.com/sqs/v2/home?region=us-west-2#/queues/https%3A%2F%2Fsqs.us-west-2.amazonaws.com%2F123456789012%2Fmy-app-queue"
      example:
        id: "des_sqs_456"
        type: "aws_sqs"
        topics: ["*"]
        disabled_at: "2024-03-01T12:00:00Z"
        created_at: "2024-02-20T11:30:00Z"
        updated_at: "2024-02-20T11:30:00Z"
        config:
          queue_url: "https://sqs.us-west-2.amazonaws.com/123456789012/my-app-queue"
          endpoint: "https://sqs.us-west-2.amazonaws.com"
        credentials:
          key: "AKIAIOSFODNN7EXAMPLE"
          secret: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    DestinationRabbitMQ:
      type: object
      x-docs-type: "RabbitMQ"
      # Properties duplicated from DestinationBase
      required: [id, type, topics, config, credentials, created_at, updated_at, disabled_at]
      properties:
        id:
          type: string
          description: Control plane generated ID or user provided ID for the destination.
          example: "des_12345"
        type:
          type: string
          description: Type of the destination.
          enum: [rabbitmq]
          example: "rabbitmq"
        topics:
          $ref: "#/components/schemas/Topics"
        filter:
          $ref: "#/components/schemas/Filter"
        disabled_at:
          type: string
          format: date-time
          nullable: true
          description: ISO Date when the destination was disabled, or null if enabled.
          example: null
        created_at:
          type: string
          format: date-time
          description: ISO Date when the destination was created.
          example: "2024-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: ISO Date when the destination was last updated.
          example: "2024-01-01T00:00:00Z"
        config:
          $ref: "#/components/schemas/RabbitMQConfig"
        credentials:
          $ref: "#/components/schemas/RabbitMQCredentials"
        delivery_metadata:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Static key-value pairs merged into event metadata on every attempt.
          example: {"app-id": "my-app", "region": "us-east-1"}
        metadata:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Arbitrary contextual information stored with the destination.
          example: {"internal-id": "123", "team": "platform"}
        target:
          type: string
          description: A human-readable representation of the destination target (RabbitMQ exchange). Read-only.
          readOnly: true
          example: "events-exchange"
        target_url:
          type: string
          format: url
          nullable: true # No direct URL for an exchange
          description: A URL link to the destination target (not applicable for RabbitMQ exchange). Read-only.
          readOnly: true
          example: null
      example:
        id: "des_rmq_789"
        type: "rabbitmq"
        topics: ["inventory.updated"]
        disabled_at: null
        created_at: "2024-01-10T09:00:00Z"
        updated_at: "2024-01-10T09:00:00Z"
        config:
          server_url: "amqp.cloudamqp.com:5671"
          exchange: "events-exchange"
          tls: "true"
        credentials:
          username: "app_user"
          password: "secure_password_123"
    DestinationHookdeck:
      type: object
      x-docs-type: "Hookdeck Event Gateway"
      # Properties duplicated from DestinationBase
      required: [id, type, topics, credentials, created_at, disabled_at] # No config
      properties:
        id:
          type: string
          description: Control plane generated ID or user provided ID for the destination.
          example: "des_12345"
        type:
          type: string
          description: Type of the destination.
          enum: [hookdeck]
          example: "hookdeck"
        topics:
          $ref: "#/components/schemas/Topics"
        filter:
          $ref: "#/components/schemas/Filter"
        disabled_at:
          type: string
          format: date-time
          nullable: true
          description: ISO Date when the destination was disabled, or null if enabled.
          example: null
        created_at:
          type: string
          format: date-time
          description: ISO Date when the destination was created.
          example: "2024-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: ISO Date when the destination was last updated.
          example: "2024-01-01T00:00:00Z"
        config: {} # Empty config
        credentials:
          $ref: "#/components/schemas/HookdeckCredentials"
