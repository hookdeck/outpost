        - name: granularity
          in: query
          required: false
          schema:
            type: string
          description: |
            Time bucketing granularity. Pattern: `<number><unit>`.
            Units: `s` (1-60), `m` (1-60), `h` (1-24), `d` (1-31), `w` (1-4), `M` (1-12).
            When omitted, returns a single aggregate row per dimension combination.
          example: "1h"
        - name: measures
          in: query
          required: true
          schema:
            oneOf:
              - type: string
                enum: [count, successful_count, failed_count, error_rate, first_attempt_count, retry_count, manual_retry_count, avg_attempt_number, rate, successful_rate, failed_rate]
              - type: array
                items:
                  type: string
                  enum: [count, successful_count, failed_count, error_rate, first_attempt_count, retry_count, manual_retry_count, avg_attempt_number, rate, successful_rate, failed_rate]
          description: Measures to compute. At least one required. Rate measures (`rate`, `successful_rate`, `failed_rate`) are throughput in events/second. Use bracket notation for multiple values (e.g., `measures[0]=count&measures[1]=error_rate`).
          example: ["count", "error_rate"]
        - name: dimensions
          in: query
          required: false
          schema:
            oneOf:
              - type: string
                enum: [tenant_id, destination_id, destination_type, topic, status, code, manual, attempt_number]
              - type: array
                items:
                  type: string
                  enum: [tenant_id, destination_id, destination_type, topic, status, code, manual, attempt_number]
          description: Dimensions to group results by. Use bracket notation for multiple values (e.g., `dimensions[0]=status&dimensions[1]=destination_id`).
        - name: filters[destination_id]
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: Filter by destination ID(s). Use bracket notation for multiple values (e.g., `filters[destination_id][0]=d1&filters[destination_id][1]=d2`).
        - name: filters[destination_type]
          in: query
          required: false
          schema:
            oneOf:
              - $ref: "#/components/schemas/DestinationType"
              - type: array
                items:
                  $ref: "#/components/schemas/DestinationType"
          description: Filter by destination type(s). Use bracket notation for multiple values (e.g., `filters[destination_type][0]=webhook&filters[destination_type][1]=aws_sqs`).
        - name: filters[topic]
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: Filter by topic name(s). Use bracket notation for multiple values (e.g., `filters[topic][0]=user.created&filters[topic][1]=user.updated`).
        - name: filters[status]
          in: query
          required: false
          schema:
            oneOf:
              - type: string
                enum: [success, failed]
              - type: array
                items:
                  type: string
                  enum: [success, failed]
          description: Filter by attempt status(es). Use bracket notation for multiple values (e.g., `filters[status][0]=success&filters[status][1]=failed`).
        - name: filters[code]
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: Filter by HTTP status code(s). Use bracket notation for multiple values (e.g., `filters[code][0]=200&filters[code][1]=500`).
        - name: filters[manual]
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by manual retry flag.
        - name: filters[attempt_number]
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: Filter by attempt number(s). Use bracket notation for multiple values (e.g., `filters[attempt_number][0]=1&filters[attempt_number][1]=2`).
        - name: filters[tenant_id]
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: Filter by tenant ID(s). Admin-only — rejected with 403 for JWT callers. Use bracket notation for multiple values (e.g., `filters[tenant_id][0]=t1&filters[tenant_id][1]=t2`).
      responses:
        "200":
          description: Aggregated attempt metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
              examples:
                DailyAttemptCounts:
                  value:
                    data:
                      - time_bucket: "2026-03-02T00:00:00Z"
                        dimensions:
                          destination_id: "dest_abc"
                        metrics:
                          count: 1423
                          successful_count: 1393
                          failed_count: 30
                          error_rate: 0.0211
                    metadata:
                      granularity: "1d"
                      query_time_ms: 38
                      row_count: 1
                      row_limit: 100000
                      truncated: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: JWT caller attempted to use admin-only dimension or filter (tenant_id).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
security:
  - BearerAuth: []
