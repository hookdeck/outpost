        "200":
          application/json: {"id": "tenant_123", "destinations_count": 5, "topics": ["user.created", "user.deleted"], "created_at": "2024-01-01T00:00:00Z"}
    speakeasy-default-upsert-tenant:
      parameters:
        path:
          tenant_id: "<id>"
      responses:
        "200":
          application/json: {"id": "123", "destinations_count": 5, "topics": ["user.created", "user.deleted"], "created_at": "2024-01-01T00:00:00Z", "updated_at": "2024-01-01T00:00:00Z"}
        "401":
          application/json: {}
        "422":
          application/json: {"status": 422, "message": "validation error", "data": ["email is required", "password must be at least 6 characters"]}
        "500":
          application/json: {}
  getTenant:
    TenantExample:
      parameters:
        path:
          tenant_id: "<id>"
      responses:
        "200":
          application/json: {"id": "tenant_123", "destinations_count": 5, "topics": ["user.created", "user.deleted"], "created_at": "2024-01-01T00:00:00Z"}
    speakeasy-default-get-tenant:
      parameters:
        path:
          tenant_id: "<id>"
      responses:
        "200":
          application/json: {"id": "123", "destinations_count": 5, "topics": ["user.created", "user.deleted"], "created_at": "2024-01-01T00:00:00Z", "updated_at": "2024-01-01T00:00:00Z"}
        "401":
